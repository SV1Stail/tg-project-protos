syntax = "proto3";

package post_processor;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/SV1Stail/tg-project-protos/gen/go/post_processor;post_processor_pb";

service Queuescheduler {
    rpc CreateOriginalPost (CreateOriginalPostRequest) returns (CreatePostCreateOriginalPostResponse);
    rpc CreateOriginalPosts (CreateOriginalPostsRequest) returns (CreatePostCreateOriginalPostsResponse);
    rpc DeleteOriginalPostsByChannel (DeleteOriginalPostsByChannelRequest) returns (DeleteOriginalPostsByChannelResponse);
    rpc GetOriginalPostsFromDB (GetOriginalPostsFromDBRequest) returns (GetOriginalPostsFromDBResponse);
}

message CreateOriginalPostRequest {
    string text = 1;
    string link_original_post = 2;
    string original_channel = 3;
    string theme = 4;
}

message CreatePostCreateOriginalPostResponse {
    string id = 1;
}

message CreateOriginalPostsRequest {
    repeated string text = 1;
    string link_original_post = 2;
    string original_channel = 3;
    string theme = 4;
}

message CreatePostCreateOriginalPostsResponse {
    repeated string ids = 1;
}

message DeleteOriginalPostsByChannelRequest {
    string original_channel = 1;
}

message DeleteOriginalPostsByChannelResponse {
    repeated string ids = 1; 
}
message GetOriginalPostsFromDBRequest {
    int32 limit = 1;
    int32 offset = 2;
}

message GetOriginalPostsFromDBResponse {
    repeated OriginalPost posts = 1;
}

message OriginalPost {
    string id = 1;
    string data = 2;
    string link_original_post = 3;
    string original_channel = 4;
    string original_image_url = 5;
    string theme = 6;
    google.protobuf.Timestamp created_at = 7;
    google.protobuf.Timestamp updated_at = 8;
}