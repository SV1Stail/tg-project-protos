syntax = "proto3";

package queue_scheduler;
import "google/protobuf/timestamp.proto";

option go_package = "github.com/SV1Stail/tg-project-protos/gen/go/queue_scheduler;queue_scheduler_pb";

service Queuescheduler {
    rpc CreatePost (CreatePostRequest) returns (CreatePostResponse);
    rpc UpdatePost (UpdatePostRequest) returns (UpdatePostResponse);
    // mark post on delete, cancel posting
    rpc DeletePost (DeletePostRequest) returns (DeletePostResponse);
    // mark posts on delete, cancel posting
    rpc DeletePostsForChannel (DeletePostsForChannelRequest) returns (DeletePostsForChannelResponse);
    rpc GetPost (GetPostRequest) returns (GetPostResponse);
    rpc GetPostsForChannel (GetPostsForChannelRequest) returns (GetPostsForChannelResponse);
}

message Post {
    // Object identifier
    string id = 1;
    // channel to publish
    string publish_channel = 2;
    // Object text or other info in body
    PublishPostData data = 3;
    // Object publishing time
    google.protobuf.Timestamp publish_at = 4;
    // Object creation time
    google.protobuf.Timestamp created_at = 5;
    // Object last updated time
    google.protobuf.Timestamp updated_at = 6;
    // Where images saved (maybe URLs)
    repeated string images_urls = 7;

}

message PublishPostData {
    // Object title
    string title = 1;
    // Object text
    string body = 2;
    // URLs on original post
    repeated string post_url = 3;
}

message CreatePostRequest {
    // channel to post
    string publish_channel = 1;
    // Object data
    PublishPostData data = 2;
    // Object publishing time
    google.protobuf.Timestamp publish_at = 3;
}
message CreatePostResponse { 
    // created post
    Post post = 1;
}

message UpdatePostRequest {
    // Object identifier
    string id = 1;
    // channel to post
    string publish_channel = 2;
    // Object data
    PublishPostData data = 3;
    // Object publishing time
    google.protobuf.Timestamp publish_at = 4;
}
message UpdatePostResponse { 
    // updated post
    Post post = 1;
}

message DeletePostRequest {
    // Object identifier
    string id = 1;
}
message DeletePostResponse {
    // deleted Objects identifier
    string id = 1;
}

message GetPostRequest {
    // Object identifier
    string id = 1;
}
message GetPostResponse {
    // get Object
    Post post = 1;
}

message GetPostsForChannelRequest {
    // channel to post
    string publish_channel = 1;
}
message GetPostsForChannelResponse {
    // get Objects array
    repeated Post posts = 1;
}

message DeletePostsForChannelRequest {
    // channel where posts will be publish
    string publish_channel = 1;
}

message DeletePostsForChannelResponse {
    // deleted posts
    repeated string ids = 1;
}